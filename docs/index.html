<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spectral 3D Packing Results</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header>
      <div>
        <p class="eyebrow">3d-packing</p>
        <h1>Spectral packing result viewer</h1>
        <p>
          WebGL preview of the current packed STL outputs generated by the Rust
          implementation.
        </p>
      </div>
      <a class="repo-link" href="https://github.com/tanashou1/3d-packing">GitHub</a>
    </header>

    <main>
      <section class="panel controls">
        <label for="result-select">Result</label>
        <select id="result-select"></select>
        <div id="stats" class="stats"></div>
        <details>
          <summary>Attribution / source</summary>
          <pre id="attribution">Select a result to load attribution.</pre>
        </details>
      </section>

      <section class="viewer-wrap">
        <canvas id="viewer"></canvas>
        <div id="status" class="status">Loading...</div>
        <div class="help">Drag: rotate / Wheel: zoom / Double click: reset</div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
