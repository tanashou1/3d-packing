<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>スペクトル3Dパッキング結果ビューア</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header>
      <div>
        <p class="eyebrow">3d-packing</p>
        <h1>スペクトルパッキング結果ビューア</h1>
        <p>
          Rust実装で生成した現在のパック済みSTLをWebGLで閲覧できます。
        </p>
      </div>
      <nav class="header-links" aria-label="関連リンク">
        <a class="pill-link" href="implementation-details.md">実装詳細</a>
        <a class="pill-link" href="deployment.md">デプロイ運用</a>
        <a class="pill-link" href="https://github.com/tanashou1/3d-packing">GitHub</a>
      </nav>
    </header>

    <main>
      <section class="panel controls">
        <label for="result-select">結果</label>
        <select id="result-select"></select>
        <div id="stats" class="stats"></div>
        <details>
          <summary>帰属表示 / 出典</summary>
          <pre id="attribution">結果を選択すると帰属表示を読み込みます。</pre>
        </details>
      </section>

      <section class="viewer-wrap">
        <canvas id="viewer"></canvas>
        <div id="status" class="status">読み込み中...</div>
        <div class="help">ドラッグ: 回転 / ホイール: ズーム / ダブルクリック: リセット</div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
